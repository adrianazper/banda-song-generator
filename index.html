<!DOCTYPE html>
<html lang="en">
<head>
<title>Banda AZ Song Generator</title>
<meta charset="UTF-8"/>
<link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Banda AZ Song Generator</h1>
        <img id="azlogo" src="images\AZ-LOGO.png" alt="AZ Logo" class="logo">
    </header>
    <main>
        <h2>Generate A Song</h2>
        <p id="clickbutton">Click the 'generate song' button to generate a random song to play</p>
        <select id="myFilter">
            <option value="All">Show All</option>
            <option value="Cumbias">Cumbias</option>
            <option value="Rancheras">Rancheras</option>
            <option value="Corridos">Corridos</option>
            <option value="Zapateados">Zapateados</option>
            <option value="Romanticas">Romanticas</option>
        </select>
        
        <button id="generateBtn" type="generate">Generate Song</button>

        <p id="result"></p>
    </main>
<script src="script.js"></script>
</body>
</html>
