<!DOCTYPE html>
<html lang="en">
<head>
<title>Banda Song Generator</title>
<meta charset="UTF-8"/>
<link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Banda AZ Song Generator</h1>
        <img id="azlogo" src="images\AZ-LOGO.png" alt="AZ Logo" class="logo">

</html>
